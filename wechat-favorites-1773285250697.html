<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信收藏整理 - 2026/3/12</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .header h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
    .header p { color: #666; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .stat-card h3 { color: #667eea; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }
    .stat-value { font-size: 36px; font-weight: bold; color: #333; }
    .filters {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .filter-group { margin-bottom: 15px; }
    .filter-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
    .filter-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-btn {
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 13px;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    .search-box {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 16px;
    }
    .item-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .item-type {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .type-文章 { background: #e3f2fd; color: #1976d2; }
    .type-视频 { background: #fce4ec; color: #c2185b; }
    .type-笔记 { background: #f3e5f5; color: #7b1fa2; }
    .type-链接 { background: #e8f5e9; color: #388e3c; }
    .item-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 10px; line-height: 1.4; }
    .item-category { display: inline-block; padding: 3px 10px; background: #667eea; color: white; border-radius: 12px; font-size: 12px; margin-right: 8px; }
    .item-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .item-tag { padding: 2px 8px; background: #f5f5f5; border-radius: 4px; font-size: 11px; color: #666; }
    .chart-container { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📚 微信收藏整理</h1>
      <p>共整理 3 条收藏，生成时间：2026/3/12 11:14:10</p>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <h3>总收藏数</h3>
        <div class="stat-value">3</div>
      </div>
      <div class="stat-card">
        <h3>分类数量</h3>
        <div class="stat-value">3</div>
      </div>
      <div class="stat-card">
        <h3>标签数量</h3>
        <div class="stat-value">5</div>
      </div>
    </div>
    
    <div class="chart-container">
      <canvas id="categoryChart" height="100"></canvas>
    </div>
    
    <div class="filters">
      <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索标题、标签...">
      
      <div class="filter-group">
        <label>按类型筛选</label>
        <div class="filter-buttons" id="typeFilters"></div>
      </div>
      
      <div class="filter-group">
        <label>按分类筛选</label>
        <div class="filter-buttons" id="categoryFilters"></div>
      </div>
    </div>
    
    <div class="items-grid" id="itemsGrid"></div>
  </div>
  
  <script>
    const items = [
  {
    "type": "文章",
    "title": "如何学习Python编程",
    "url": "https://mp.weixin.qq.com/s/example1",
    "date": "2026-03-12",
    "category": "技术",
    "tags": [
      "Python",
      "文章"
    ]
  },
  {
    "type": "视频",
    "title": "OpenClaw使用教程",
    "url": "https://mp.weixin.qq.com/s/example2",
    "date": "2026-03-12",
    "category": "其他",
    "tags": [
      "视频"
    ]
  },
  {
    "type": "笔记",
    "title": "产品需求文档模板",
    "url": "https://mp.weixin.qq.com/s/example3",
    "date": "2026-03-12",
    "category": "产品",
    "tags": [
      "产品",
      "笔记"
    ]
  }
];
    const stats = {
  "total": 3,
  "byType": {
    "文章": 1,
    "视频": 1,
    "笔记": 1
  },
  "byCategory": {
    "技术": 1,
    "其他": 1,
    "产品": 1
  },
  "byTag": {
    "Python": 1,
    "文章": 1,
    "视频": 1,
    "产品": 1,
    "笔记": 1
  }
};
    
    // 渲染类型筛选按钮
    const typeFilters = document.getElementById('typeFilters');
    Object.keys(stats.byType).forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = type + ' (' + stats.byType[type] + ')';
      btn.onclick = () => toggleFilter(btn, 'type', type);
      typeFilters.appendChild(btn);
    });
    
    // 渲染分类筛选按钮
    const categoryFilters = document.getElementById('categoryFilters');
    Object.keys(stats.byCategory).forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = cat + ' (' + stats.byCategory[cat] + ')';
      btn.onclick = () => toggleFilter(btn, 'category', cat);
      categoryFilters.appendChild(btn);
    });
    
    // 渲染收藏卡片
    function renderItems(filteredItems) {
      const grid = document.getElementById('itemsGrid');
      grid.innerHTML = '';
      
      filteredItems.forEach(item => {
        const card = document.createElement('a');
        card.className = 'item-card';
        card.href = item.url;
        card.target = '_blank';
        card.dataset.type = item.type;
        card.dataset.category = item.category;
        
        card.innerHTML = `
          <span class="item-type type-${item.type}">${item.type}</span>
          <div class="item-title">${item.title}</div>
          <span class="item-category">${item.category}</span>
          <div class="item-tags">
            ${item.tags.map(tag => '<span class="item-tag">' + tag + '</span>').join('')}
          </div>
        `;
        
        grid.appendChild(card);
      });
    }
    
    // 筛选状态
    let activeFilters = { type: null, category: null };
    
    function toggleFilter(btn, filterType, value) {
      const buttons = btn.parentElement.querySelectorAll('.filter-btn');
      
      if (activeFilters[filterType] === value) {
        activeFilters[filterType] = null;
        btn.classList.remove('active');
      } else {
        buttons.forEach(b => b.classList.remove('active'));
        activeFilters[filterType] = value;
        btn.classList.add('active');
      }
      
      applyFilters();
    }
    
    function applyFilters() {
      let filtered = items;
      
      if (activeFilters.type) {
        filtered = filtered.filter(i => i.type === activeFilters.type);
      }
      if (activeFilters.category) {
        filtered = filtered.filter(i => i.category === activeFilters.category);
      }
      
      const searchTerm = document.getElementById('searchBox').value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(i => 
          i.title.toLowerCase().includes(searchTerm) ||
          i.tags.some(t => t.toLowerCase().includes(searchTerm))
        );
      }
      
      renderItems(filtered);
    }
    
    // 搜索功能
    document.getElementById('searchBox').addEventListener('input', applyFilters);
    
    // 渲染分类图表
    const ctx = document.getElementById('categoryChart').getContext('2d');
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(stats.byCategory),
        datasets: [{
          data: Object.values(stats.byCategory),
          backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'right' },
          title: { display: true, text: '收藏分类分布' }
        }
      }
    });
    
    // 初始渲染
    renderItems(items);
  </script>
</body>
</html>
