  <style>
    .card-hover { transition: all 0.2s; }

    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-2">微信收藏整理</h1>
      <p class="text-gray-500 text-sm">共 <span id="total-count">0</span> 条 · <span id="unread-count">0</span> 未读</p>
    </div>

    <!-- Search -->
    <div class="relative mb-4">
      <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input type="text" id="search-input" placeholder="搜索标题、标签..." 
        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Category Filter with Tag Toggle -->
    <div class="mb-2 flex items-center justify-between">
      <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">分类</span>
      <button id="tag-toggle" class="text-xs text-gray-500 hover:text-blue-600 transition flex items-center gap-1">
        <i class="fas fa-filter"></i>标签筛选
      </button>
    </div>
    <div class="flex flex-wrap gap-2 mb-4" id="category-filters"></div>

    <!-- Tag Cloud (Collapsible) -->
    <div id="tag-cloud-container" class="hidden mb-6">
      <div class="flex flex-wrap gap-2" id="tag-cloud"></div>
    </div>

    <!-- Stats Bar -->
    <div class="flex items-center justify-between mb-4 text-sm">
      <div class="flex gap-4">
        <button id="filter-unread" class="text-gray-500 hover:text-blue-600 transition">
          <i class="far fa-circle mr-1"></i>仅看未读
        </button>
        <button id="filter-starred" class="text-gray-500 hover:text-yellow-600 transition">
          <i class="fas fa-star mr-1"></i>仅看收藏
        </button>
      </div>
      <button id="clear-filters" class="text-gray-400 hover:text-gray-600 hidden">
        <i class="fas fa-times mr-1"></i>清除筛选
      </button>
    </div>

    <!-- Cards Grid -->
    <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16">
      <i class="fas fa-inbox text-4xl text-gray-300 mb-4"></i>
      <p class="text-gray-500">没有找到匹配的内容</p>

    ];
    
    let currentFilter = { category: 'all', search: '', tag: '', unreadOnly: false, starredOnly: false };
    let readItems = JSON.parse(localStorage.getItem('readItems') || '[]');
    let starredItems = JSON.parse(localStorage.getItem('starredItems') || '[]');

    function getCategoryCounts() {
      const counts = { all: favoritesData.length };
      favoritesData.forEach(item => { counts[item.category] = (counts[item.category] || 0) + 1; });
      return counts;
    }

    function getTagsForCategory(category) {
      let items = category === 'all' ? favoritesData : favoritesData.filter(item => item.category === category);
      const tagCounts = {};
      items.forEach(item => { item.tags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; }); });
      return Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 15).map(([tag]) => tag);
    }

    function renderCategories() {
      const counts = getCategoryCounts();
      const categories = [
        { key: 'all', label: '全部', icon: '📋' },
        { key: 'OpenClaw', label: 'OpenClaw', icon: '🦞' },
        { key: 'AI工具', label: 'AI工具', icon: '🤖' },
        { key: 'AI创业', label: 'AI创业', icon: '🚀' },
        { key: '内容创作', label: '内容创作', icon: '🎬' },
        { key: '职场/成长', label: '职场/成长', icon: '💼' },
        { key: '商业洞察', label: '商业洞察', icon: '📈' },
        { key: 'AI资讯', label: 'AI资讯', icon: '📰' },
        { key: '技术/开发', label: '技术/开发', icon: '💻' },
        { key: '其他', label: '其他', icon: '📦' }
      ];

      const container = document.getElementById('category-filters');
      container.innerHTML = categories.map(cat => {
        const isActive = currentFilter.category === cat.key;
        return `<button class="category-btn px-4 py-2 rounded-full text-sm font-medium transition ${isActive ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-100'}" data-category="${cat.key}">${cat.icon} ${cat.label} ${counts[cat.key] || 0}</button>`;
      }).join('');

      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter.category = btn.dataset.category;
          currentFilter.tag = '';
          renderCategories();
          renderTagCloud();
          renderCards();
        });
      });
    }

    function renderTagCloud() {
      const tags = getTagsForCategory(currentFilter.category);
      const container = document.getElementById('tag-cloud');
      container.innerHTML = tags.map(tag => `<button class="tag-btn px-3 py-1 rounded-full text-xs transition ${currentFilter.tag === tag ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-600 hover:bg-blue-100 hover:text-blue-600'}" data-tag="${tag}">#${tag}</button>`).join('');
      
      document.querySelectorAll('.tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter.tag = currentFilter.tag === btn.dataset.tag ? '' : btn.dataset.tag;
          renderTagCloud();
          renderCards();
        });
      });
    }

    function renderCards() {
      let filtered = favoritesData.filter(item => {
        if (currentFilter.category !== 'all' && item.category !== currentFilter.category) return false;
        if (currentFilter.search && !item.title.toLowerCase().includes(currentFilter.search.toLowerCase()) && !item.tags.some(t => t.toLowerCase().includes(currentFilter.search.toLowerCase()))) return false;
        if (currentFilter.tag && !item.tags.includes(currentFilter.tag)) return false;
        if (currentFilter.unreadOnly && readItems.includes(item.title)) return false;
        if (currentFilter.starredOnly && !starredItems.includes(item.title)) return false;
        return true;
      });

      document.getElementById('total-count').textContent = filtered.length;
      document.getElementById('unread-count').textContent = favoritesData.filter(item => !readItems.includes(item.title)).length;

      if (filtered.length === 0) {
        document.getElementById('cards-grid').innerHTML = '';
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }

      document.getElementById('empty-state').classList.add('hidden');

      const gradients = {
        'OpenClaw': 'from-orange-400 to-red-500',
        'AI工具': 'from-blue-400 to-purple-500',
        'AI创业': 'from-green-400 to-teal-500',
        '内容创作': 'from-pink-400 to-rose-500',
        '职场/成长': 'from-yellow-400 to-orange-500',
        '商业洞察': 'from-indigo-400 to-blue-500',
        'AI资讯': 'from-cyan-400 to-blue-500',
        '技术/开发': 'from-gray-400 to-slate-500',
        '其他': 'from-slate-300 to-gray-400'
      };

      document.getElementById('cards-grid').innerHTML = filtered.map(item => {
        const isRead = readItems.includes(item.title);
        const isStarred = starredItems.includes(item.title);
        const gradient = gradients[item.category] || 'from-gray-300 to-gray-400';
        
        const safeUrl = item.url.replace(/&/g, '&amp;');
        return `
          <div class="card-hover bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <a href="${safeUrl}" target="_blank" class="block" onclick="markReadByTitle('${item.title.replace(/'/g, "\\'")}')">
              <div class="relative h-32 bg-gradient-to-br ${gradient} flex items-center justify-center">
                <div class="absolute top-2 right-2 flex gap-1">
                  ${isStarred ? '<span class="text-yellow-400 text-lg">⭐</span>' : ''}
                  ${!isRead ? '<span class="w-2 h-2 bg-blue-500 rounded-full"></span>' : ''}
                </div>
                <div class="absolute bottom-2 left-2">
                  <span class="px-2 py-1 bg-black/50 text-white text-xs rounded-full">${item.category}</span>
                </div>
              </div>
              <div class="p-4">
                <h4 class="font-medium text-gray-800 mb-2 line-clamp-2 leading-snug">${item.title}</h4>
              </div>
            </a>
            <div class="px-4 pb-4">
              <div class="flex items-center justify-between">
                <div class="flex flex-wrap gap-1">
                  ${item.tags.slice(0, 2).map(tag => `<span class="px-2 py-0.5 bg-gray-100 text-gray-500 text-xs rounded">#${tag}</span>`).join('')}
                </div>
                <div class="flex gap-2">
                  <button onclick="toggleReadByTitle('${item.title.replace(/'/g, "\\'")}')" class="p-1.5 rounded-lg hover:bg-gray-100 transition">
                    <i class="${isRead ? 'fas fa-check-circle text-green-500' : 'far fa-circle text-gray-400'} text-sm"></i>
                  </button>
                  <button onclick="toggleStarByTitle('${item.title.replace(/'/g, "\\'")}')" class="p-1.5 rounded-lg hover:bg-gray-100 transition">
                    <i class="${isStarred ? 'fas fa-star text-yellow-400' : 'far fa-star text-gray-400'} text-sm"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      const hasFilters = currentFilter.category !== 'all' || currentFilter.search || currentFilter.tag || currentFilter.unreadOnly || currentFilter.starredOnly;
      document.getElementById('clear-filters').classList.toggle('hidden', !hasFilters);
    }

    window.markReadByTitle = function(title) {
      if (!readItems.includes(title)) {
        readItems.push(title);
        localStorage.setItem('readItems', JSON.stringify(readItems));
        renderCards();
      }
    };

    window.toggleReadByTitle = function(title) {
      readItems = readItems.includes(title) ? readItems.filter(t => t !== title) : [...readItems, title];
      localStorage.setItem('readItems', JSON.stringify(readItems));
      renderCards();
    };

    window.toggleStarByTitle = function(title) {
      starredItems = starredItems.includes(title) ? starredItems.filter(t => t !== title) : [...starredItems, title];
      localStorage.setItem('starredItems', JSON.stringify(starredItems));
      renderCards();
    };



    document.getElementById('search-input').addEventListener('input', (e) => { currentFilter.search = e.target.value; renderCards(); });
    document.getElementById('filter-unread').addEventListener('click', () => { currentFilter.unreadOnly = !currentFilter.unreadOnly; document.getElementById('filter-unread').classList.toggle('text-blue-600', currentFilter.unreadOnly); renderCards(); });
    document.getElementById('filter-starred').addEventListener('click', () => { currentFilter.starredOnly = !currentFilter.starredOnly; document.getElementById('filter-starred').classList.toggle('text-yellow-600', currentFilter.starredOnly); renderCards(); });
    document.getElementById('clear-filters').addEventListener('click', () => { currentFilter = { category: 'all', search: '', tag: '', unreadOnly: false, starredOnly: false }; document.getElementById('search-input').value = ''; renderCategories(); renderTagCloud(); renderCards(); });
    
    // Tag toggle
    document.getElementById('tag-toggle').addEventListener('click', () => {
      const container = document.getElementById('tag-cloud-container');
      container.classList.toggle('hidden');
      document.getElementById('tag-toggle').classList.toggle('text-blue-600');
    });

    renderCategories();
    renderTagCloud();
    renderCards();
  </script>
</body>
</html>
